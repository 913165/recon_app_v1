spring:
  threads:
    virtual:
      enabled: true
  datasource:
    # reWriteBatchedInserts: driver rewrites batched INSERTs for fewer round-trips to PostgreSQL
    url: jdbc:postgresql://localhost:5432/recondb?reWriteBatchedInserts=true
    username: recon_user
    password: recon_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    # Off in prod: logging every SQL adds latency (I/O) on bulk inserts. Use true only when debugging.
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: always

recon:
  file:
    # Input/output filenames use: NPCI_TXN_{date}.{ext}, SWITCH_LOG_{date}.{ext}, RECON_RESULT_{date}.{ext}
    extension: ${RECON_FILE_EXT:dat}
    input:
      # Relative to working dir (run Maven from project root). Override for Docker: RECON_NPCI_PATH=/data/input/npci
      npci-path: ${RECON_NPCI_PATH:data/input/npci}
      switch-path: ${RECON_SWITCH_PATH:data/input/switch}
    output:
      path: ${RECON_OUTPUT_PATH:data/output}
